body:
  text: 姚秦三藏法師鳩摩羅什譯明吳門北禪寺沙門大惠釋佛說阿彌陀經梵語阿彌陀此云無量壽亦云無量光佛說者即此土我佛世尊讚彼佛名號本願殊勝種種方便接引羣生故無量者約數言之即壽無量約理言之即心無量何以故一切衆生住無量體中才起一念一念中具生住異滅即成四念展轉有無量念即在一念中流轉如是一念具足不可思不可說神用光明照十方國名曰無量光若衆生依無量體中起一念時在此一念中遍計即成多念便有無量生死此是流轉門若在還滅門中而心意識不可到故曰無量亦為數之極如是無量數逆而歸萬萬歸千千歸百百歸一一不知歸於何處故稱無量方始聖凡心盡十方皆為淨土也無量壽即體也無量光即用也此無量光一句東西兩土盡空法界總為一句阿彌陀佛更無剩法何以故心即無量世界亦無量所謂法界藏身阿彌陀佛佛者譯名覺也蓋愚智皆具奈何凡聖情隔不能入清淨覺耳若聖凡俱泯又為斷滅若混而不分亦名矯亂離此多言十法界皆成圓滿覺性方可說法應一切機亦名一切種智經者如潤大地之水未失本源流注故所以佛佛始終教義但用一個經之源貫通血脉耳彼佛經無量劫單說一個經字即此一字一切法具耶不具耶曰經行十萬億即在飯食時若諦觀實際淨土因緣者豈文字可詮乎離文字焉有是乎惠雖脫舊言新亦是過中語句其餘名相舊釋已詳置而不述者今已訣但解一句古彌陀例於情與無情皆無缺少此經題六字如是我聞等句是經家貫通文勢耳如是我聞至無量諸天大衆俱如是我聞者阿難親聞斷疑生信故一時者世尊說此經時三時為一時可為說法之要覺三心無覔曰佛也祇樹給孤獨園者是說法處所非是虗空無體之談在事相中有體法耳表無虗妄也因人心流注必須在一微塵聖凡心盡處方得如如一時大用也比丘及大菩薩衆者嘗隨衆也表無性之理所說法不從佛生不從比丘生不從佛與比丘菩薩諸天共生因此土昏迷衆生而生所以不是無因而生一切衆生因無明緣行乃至生緣老死皆從緣生無自性故說無生一切聖凡身語意業及法界從地水火風空而生如是五大各從緣生無自性故是故說無生一切有情無情同住本際三世本是虗妄無自性故曰無生無生淨土旨要愚者十萬億智者在目前佛雖指西方象表此土事物上全張何也此土一事一物具一大藏始末法法皆是因緣所生故若以寸土許物分析生空轉於空生至於雙照雙泯圓明便入無生已更有一種有血氣者在寸土物中不經前途用無生無滅無來無去祕密觀照一剎那頃頓入圓音妙旨者即世尊四十九年法一時說盡耳可見人人無量壽物物無量光口口吐蓮華步步黃金界四苦咸極樂八難皆淨土淨手盆中是八功德水鳥鳴風吹樹演暢無生義未然者用一句阿彌陀佛念念截斷衆流終有到遮時節此經無問而自說者何也一者此方弟子無有緣起直指西方之樂令人好樂二者無當機故所以詔告舍利弗何以故欲令現前大衆頓契無量光之句也如此說者為末世衆生出生死捷要不然只是方便有餘土耳敘分已竟下云正宗分爾時佛告至今現在說法有世界名極樂者彼國依報莊嚴阿彌陀今現在說法是正報相好莊嚴極樂者是依正之兼備標一經之大義耳此土到彼土十萬億數不歷須臾即登彼國是事佛土中之理佛土也如斯行布圓融即事理無礙事事無礙也若細推之明一箇阿字種方可出情無虗妄也阿彌陀今現在說法者彼佛成道以來至今十劫非但十劫於無始時盡彼佛壽亦可作現在一時此意云何是本際無前後際故唯有現在一時耳若不爾者一日至於七日亦為方便但生彼國始知阿彌陀佛與我同生乃至過去未來現在諸佛亦與我同生同說法皆不離本住法故言同時說法也舍利弗至故名極樂彼土極樂者對此土極苦而言此土衆生雖苦而不發心故指西方之極樂令人好樂發念佛之志乃至一心不亂為因證不思議身為果也極樂者離此土苦樂假名為樂是名真樂下文顯無量極樂體也又舍利弗至是故名為極樂彼土莊嚴本無所表愚智循業現諸淨穢物則非心表即非物心物俱非唯心可表七重欄楯等者有難問云此七重在一人耶一世界耶唯佛有耶若一人者不得成隨乃至惟佛有者與彼國人民何干四寶周匝等皆如是答曰非也佛與衆生共有七種識與如來藏同一清淨及衆生八種識皆攝一剎那際中無為之妙用故秪因前七種識見聞覺知次第而生所以不清淨耳然而七八合而為一體無先後遍計執著即為嘗寂光也假如此土一株樹將前七種識在現量一剎那中見耶非見耶分別耶非分別耶即此一際中分得合得六根互用自然神妙不犯功勳名為極樂又舍利弗至成就如是功德莊嚴七寶池八功德水者表極樂之法式也八種識攝為一體分而為衆法故稱寶也八功德水者即藏識中流出皆是無量珍寶使衆生不枯不住即是無量妙用所住地亦皆金沙是塵沙妙用四邊階道表地水火風上有樓閣只三乘法也總是如來藏中無量種智所謂金銀乃至瑪瑙表本際中妙用池中蓮華言法之微妙大如車輪言法之無住青色青光乃至白色白光法有本位不錯亂故微妙香潔使衆生愛樂不然者如上境緣王侯富貴之家亦可為之豈淨也哉又舍利弗至成就如是功德莊嚴嘗作天樂表陀羅尼句如樂音自然之妙然此土樂音必借樂而發音非人語非不人語唯樂人可知餘不得而知也佛語祕密如樂音悟者方知迷者無知何以故直指阿彌陀佛無量光明句與樂音句無二無二故令衆生不思議熏自然信樂彼國亦有天與地及六時者即淨穢兩土當體不二故一食時供養十萬億佛土佛佛前皆以獻華作禮請說法要不出受食這一時若此土一劫彼土作一日本非神通亦非延促法爾然也咸是唯心所現經劫之嘗即是一日一日即一時一時即一剎那住斯剎那無去來故彼土如斯殊勝豈不樂乎上云報化佛說法下云法佛說法復次舍利弗至成就如是功德莊嚴雜色之鳥樹網等是法佛說法衆鳥演暢五根五力等者即此土三十七品助道法也彼土單言五根五力等者甚言其道力也何以故彼土人民依正無我不言其苦樂所以無四念處故彼國衆生越善惡嘗清淨故不言伏惡養善所以無四正勤法故彼土自有種種功德智慧莊嚴一生補處不言其欲等所以無四如意法故何以故直提上上法然而明此上上法者即在一事中藏身事事皆演上上之法耳彼佛國土無三惡道是衆鳥等是佛所化現即阿彌陀佛願力弘深故若論實理者法法頭頭無不是演這一句阿彌陀佛會鶯啼鵲噪水流風動皆悉念佛念法念僧無不是嘗寂光現前矣倘不會者必須發願往生生彼國已然諸苦滅而諸樂現然不思議淨土者在一相中是不得非不得亦不壞此相即成無相實相此正顯無情說法也寶樹羅網同時俱作者無次第生故東西兩土盡空法界俱在一毫頭上施設種種法種種事咸是念佛念法念僧何以故種種法與相皆住本際中無有前後名曰同時俱作舍利弗於汝意云何至故名阿彌陀阿彌陀佛從無量劫修無量壽之光明以成聖果無有障礙前皆依正莊嚴此獨顯正報也即阿彌陀佛在一微塵中照十方國通達無礙四聖六凡亦不出一微塵何以故微塵最微細事上上之機不壞一微塵相故稱廣大不即不離是名微妙然阿彌陀佛最高大身亦住此微塵中說法度生能舒能捲故名無量義不歷須臾佛壽無量衆生壽亦無量不出一微塵耳固然透得微塵義總持一句自然明矣舍利弗至成就如是功德莊嚴彼佛國土唯有菩薩聲聞十劫已來無有惡習衆生故名成就如是功德莊嚴又舍利弗至但可以無量無邊阿僧祗說言彼國之妙生者便登不退一生補處此土因人即念一句佛名無思無為盡一生念去自然生彼不退或一念或十念或一日至於七日將一句佛名截斷心意識如斯念者即生上上品自力不退前云一生念佛生而不退非是衆生不退彼佛菩薩誓願攝受皆是聖賢所居之地無惡伴侶是故不退耳此土凡聖同居有惡衆生故逢善即善遇惡即惡所以有進退之難也舍利弗至應當發願生彼國土此念佛人必須發願往生一日乃至七日唯遮一句佛現前不見能念所念亦無念者連遮一句也不知便可通身是佛如斯念者方可與念佛三昧相應可以一生間樂樂地臨命終時阿彌陀佛與諸聖衆親垂接引有此大利故說此言此土衆生聞是說者應當發願若無信願者此土衆苦難堪難忍長處三途煩惱為伴無明為侶何時解脫佛言不可以少善根福德因緣得生彼國若有信力念力是人福德具足諸障自除不期然而坐蓮華耳舍利弗至一切諸佛所護念經南方乃至上方亦復如是其國土諸佛名號未詳故不釋之是說該釋文後筆訛此也舍利弗於汝意云何至皆當信受我語及諸佛所說此是世尊大方便中說誠實言猶恐此土衆生不信不思議功德之利佛作證明所謂廣長舌遍覆三千大千世界者廣長舌者一切情與無情水流風動總攝不思議不二法中皆悉念佛念法念僧何以故秪一微塵內施設不二法中言佛法僧世諦語言皆順正法是故曰說誠實言總在一字流出無前後字餘故此顯法身佛說上上法故言不思議一切諸佛之所護念十方佛護念者即諸佛同為一淨土也淨土者只諸佛衆生本有非從外得三僧祗劫去染歸淨即到自心淨土所以不加工而自護念耳舍利弗至作禮而退固然念佛滅罪福生已種菩提種芽若不發願不及淨土坐蓮華一彈指頃見阿彌陀佛便登不退地耳已發願今發願人所共知當發願者何故早記者哉曰為愚者有是焉耳有發願不念佛者有者念佛不發願故當發願者只為此也若念力願力信力有是三種功能臨終畢竟往生當生皆有願力者佛無誑語故此一章亦為末世衆生流通無斷續故所以諸佛共相讚歎此經利益者只為衆生難信此經耳所謂濁世之纏縛然此濁世能令衆生厭諸苦惱樂之清淨直至菩提畢竟成佛殊不知濁世即淨土也諸佛讚希之事者為一切衆生本來無時妄稱時劫知見本間妄生分別智體本淨妄為煩惱本無五蘊三科妄作三世流轉本無延促妄為命之長短但諸佛俱在五濁惡世度生說法無衆生可度亦無法可說何以故一切衆生本是具足智慧德相故讚希有難信之法佛說阿彌陀經終拔一切業障根本得生淨土陀羅尼拔者頓也盡也力也念一句阿彌陀名號及持往生真言功能者若餘修習倍倍不及可知矣一切業障根本頓然消落非如餘懺悔漸除也更加願力深信無疑者何愁淨土不生耶此是往生淨土如斯而矣若本生淨土者即真如為根本但轉其名不轉其體轉識成智無明實體無增減故是根本為體而得一剎那生為用所謂淨土亦名陀羅尼此一箇生原在一微塵中出興所謂一塵現衆塵塵塵現一微塵一切衆生住一佛身諸佛亦住一衆生身諸佛衆生住我身我身亦住生佛身是故曰無礙也所以此經象示不思議事故相應事事無礙一門耳陀羅尼者只總持也智者現前取決愚者生去方知但因途路有別到家是同不可不知不信耳惠德薄福鮮淺學言微不堪以佛深深旨妄加箋釋偶而詮緣起無生少合聖意用報佛恩不負初心志願代代流傳佛種不斷故我佛世尊直指衆生依正東西淨穢咸是唯心所現即斯欄楯樹網七寶八功德等皆出法音樂音三寶音更非奇特何以故即此土事物一一無可表無可究無可釋直示眼前露逈逈地為未然者即宜非思非議非根非塵非識非凡非聖方如此表如斯究如斯釋如斯學世尊釋此經者但願衆生如斯信如斯念如斯發願諸佛共相讚歎而矣北禪量公二注跋尾吾人學問得於授受者淺得於天機者深世學且然而況佛法量公體敦龐之質積嚮往之誠矻矻乎欲以悟入處舉化世人蓋自千山萬水草鞋邊拾得并初中後夜蒲團上拈來非如世間阿師食人涕唾從烟黃本子尋活計者也去年有般若心經際決行世未幾彌陀已決又出夫從智慧門而收歸淨土溯流窮源因枝得本昔文殊大智發願求生西方量公述作本意與之暗合當是諸佛憫念其勤默為贊助耳壬午小除夕弟子徐波題若人識得心大地無寸土般若是心智淨土是心地二經是心之常理二注是心之指南是故除心則無般若亦無淨土況有二經與二注哉二注之中說道微塵際剎那際者所謂一念未興心源也操持此心源謂之行深般若尋到此心源謂之往生淨土行也往也必可依指南以知方所是二經之不可無二注也如此矣我禪定老人月舟胡禪師偶得此書且誦且喜欲與衆共之乃令印生翻刻流通是大慈心也是般若心也是淨土莊嚴心也三心即一心從彼微塵剎那之二際流出蓋天蓋地浩無邊際此心既無邊際此書流通亦豈有邊際哉不肖幸在衆先而看閲之不知感喜何如也因落禿筆於卷尾聊記年月云爾貞享五戊辰歲三月穀旦加州椙樹林大乘護國禪寺白卍山和南跋阿彌陀經要解清智旭解收于淨土十要第一阿彌陀經舌相清淨挺著收于閲經十二種第十
