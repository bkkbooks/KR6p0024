body:
  text: 淨土已訣序千江月現停水澄清四海風生動波混濁葢波動固風而水停致月耳豈停波海濁而動水江清者乎土之淨穢猶然佛道悟則淨土莊嚴凡心迷則穢土缺陷非道迷土淨而心悟土穢也明矣若欲生淨貴先求悟夫悟容受於生死穢耶故阿彌陀譯為無量壽無量光量以容受為義念佛到心不亂時聖凡情見俱不容受直得行樹羅網等莫不念佛法僧所謂無情說法不思議者是已悟此不容受以相應曰壽用此不容受以轉化曰光名含二義因存其梵語以流通焉淨土彌陀非惟心本性而何北禪老尊宿與余前三峰先師最為機契盡其堂奧積稔溫研先師去後酧唱者稀養道歇心安身於無量壽中如潛龍而勿用也爭奈春雷時動不免出而興雲於是縱自性天注淨土已訣一帙蓮宗心髓敲出殆盡從古迨今若疏與鈔不下數十家要且難駕其上者非但祇園激揚共轍即少林單傳亦同風而無異永明曰有禪有淨土猶如戴角虎斯之謂歟茲既訣以得已擬推己以訣於人將壽諸剞劂氏用廣傳持屬弁數言以為序愧無文字何以揄揚然贊化願中又辭而不敢因轉別峰直與提述如向上若曰無訣可得是名得訣且道是已訣耶非已訣耶吾不能加諸述焉崇禎壬午小春晦前日三峰弘證槃談題
